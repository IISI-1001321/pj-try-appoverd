name: CI / CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # e.g. your-org/pj-try-appoverd

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # ────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn verify -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # Job 2: Docker Build & Push
  # ────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    # PR 時只 build，不 push；push 到 main/develop 才推送
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────
  # Job 3: Deploy to Staging（自動，僅 main branch）
  # ────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.example.com   # 替換為實際 URL
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Deploy to Staging
        run: |
          echo "::notice::部署映像 ${{ needs.docker-build-push.outputs.image-tag }} 至 Staging..."
          # 替換為實際部署指令，例如：
          # ssh user@staging-server "docker pull $IMAGE && docker-compose up -d"

  # ────────────────────────────────────────────────────────────────
  # Job 4: Deploy to Production（需要人工核准）
  # ────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    # ╔══════════════════════════════════════════════════════════╗
    # ║  至 GitHub → Settings → Environments → production       ║
    # ║  → 開啟 Required reviewers，加入核准人員                 ║
    # ╚══════════════════════════════════════════════════════════╝
    environment:
      name: production
      url: https://example.com           # 替換為實際 URL
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy to Production
        run: |
          echo "::notice::部署映像 ${{ needs.docker-build-push.outputs.image-tag }} 至 Production..."
          # 替換為實際部署指令

      - name: Notify success
        if: success()
        run: |
          echo "::notice::Production 部署完成！Digest: ${{ needs.docker-build-push.outputs.image-digest }}"
